kind = "web"
previewPath = "/"
title = "Intelligent Retail AI Platform"
version = "1.0.0"
id = "artifacts/retail-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26111

[services.development]
run = "pnpm --filter @workspace/retail-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/retail-platform", "run", "build" ]
publicDir = "artifacts/retail-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26111"
BASE_PATH = "/"
